<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altea</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="theme-color" content="#2C7BE5">

<script>
  // Registrar Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log("SW registrado"))
      .catch(err => console.log("Error SW", err));
  }

  // Solo redirigir si NO estamos ya en modo App
  // Esto permite que si el usuario ya la instaló, no entre en un bucle
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

  if (isStandalone) {
      window.location.href = "https://redaltea.com";
  } else {
      // Si está en el navegador, esperamos a que el usuario vea el sitio
      // y le damos tiempo al navegador para procesar el Manifest
      console.log("Esperando para validar PWA...");
      
      // Opcional: Solo redirigir si el usuario hace click en algún lado
      // o después de un tiempo más largo (ej. 5 segundos)
      setTimeout(() => {
          // window.location.href = "https://redaltea.com"; 
          // Prueba comentando la redirección arriba para ver si sale el banner
      }, 5000);
  }
</script>


    <style>
        body { 
            background: #2C7BE5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: white; 
            font-family: sans-serif; 
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <img src="/icon-192.png" alt="Altea" style="width: 100px; border-radius: 20px; margin-bottom: 20px;">
        <h1>Altea</h1>
        <p>Abriendo aplicación...</p>
    </div>
</body>
</html>
