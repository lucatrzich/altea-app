<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altea</title>
    
    <link rel="manifest" href="/manifest.json">
    
    <!-- Android -->
    <meta name="theme-color" content="#4F46E5">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Apple -->
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Altea">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            font-family: -apple-system, system-ui, sans-serif; 
        }
        .container { text-align: center; }
        .logo { 
            width: 90px; 
            border-radius: 20%; 
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        p { color: #666; font-size: 14px; margin-bottom: 24px; }

        /* Banner de instalación manual para cuando no aparece el nativo */
        #install-banner {
            display: none;
            position: fixed;
            bottom: 24px;
            left: 16px;
            right: 16px;
            background: #4F46E5;
            color: white;
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            align-items: center;
            gap: 12px;
            z-index: 999;
        }
        #install-banner.show { display: flex; }
        #install-banner span { flex: 1; font-size: 14px; }
        #install-btn {
            background: white;
            color: #4F46E5;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        #dismiss-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/icon-192.png" alt="Altea" class="logo">
        <p>Iniciando Altea...</p>
    </div>

    <!-- Banner de instalación (fallback si el nativo no aparece) -->
    <div id="install-banner">
        <span>📲 Instalá Altea en tu pantalla de inicio</span>
        <button id="install-btn">Instalar</button>
        <button id="dismiss-btn">✕</button>
    </div>

    <script>
      // Registro del Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado', reg.scope))
            .catch(err => console.error('Error SW', err));
        });
      }

      // Capturar evento de instalación
      let deferredPrompt = null;
      const banner = document.getElementById('install-banner');
      const installBtn = document.getElementById('install-btn');
      const dismissBtn = document.getElementById('dismiss-btn');

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Mostrar banner propio
        banner.classList.add('show');
        console.log('beforeinstallprompt capturado ✓');
      });

      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('Resultado instalación:', outcome);
        deferredPrompt = null;
        banner.classList.remove('show');
      });

      dismissBtn.addEventListener('click', () => {
        banner.classList.remove('show');
        // Redirigir igual
        goToApp();
      });

      // Detectar si ya está instalada como PWA
      const isPWA = window.matchMedia('(display-mode: standalone)').matches 
                 || window.navigator.standalone === true;

      function goToApp() {
        window.location.href = "https://redaltea.com";
      }

      if (isPWA) {
        // Ya instalada → ir directo sin esperar
        goToApp();
      } else {
        // Esperar un poco más para que Chrome detecte la PWA y dispare el evento
        // Si el usuario no instala, igual redirigimos
        setTimeout(() => {
          if (!deferredPrompt) {
            // No hubo prompt (ya instalada antes, o Safari), redirigir
            goToApp();
          }
          // Si hay prompt visible, no redirigir todavía — el usuario decide
        }, 4000);
      }
    </script>
</body>
</html>
