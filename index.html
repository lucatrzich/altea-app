<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altea</title>
    
    <link rel="manifest" href="/manifest.json">
    
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Altea"> <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }

      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

      window.onload = () => {
        // Un tiempo más corto de carga ahora que es blanco
        setTimeout(() => {
            window.location.href = "https://redaltea.com";
        }, 800); 
      };
    </script>

    <style>
        body { 
            background: #ffffff; /* Blanco limpio */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #333; /* Texto oscuro para contraste */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        .loader-container { text-align: center; }
        .logo { width: 80px; border-radius: 18px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="loader-container">
        <img src="/icon-192.png" alt="Altea" class="logo">
        <p>Cargando Altea...</p>
    </div>
</body>
</html>
