<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altea</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Altea">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        body { 
            background: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #333;
            font-family: -apple-system, system-ui, sans-serif; 
        }
        .container { text-align: center; }
        .logo { width: 90px; border-radius: 20%; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="icon-192.png" alt="Altea" class="logo">
        <p>Iniciando Altea...</p>
    </div>

    <script>
      // Registro del Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('SW listo'))
            .catch(err => console.error('Error SW', err));
        });
      }

      // Detectar si ya está instalada
      const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

      if (isPWA) {
          // Si ya es app, vamos directo a Odoo rápido
          window.location.href = "https://redaltea.com";
      } else {
          // Si es el navegador, damos 3 segundos para que Chrome/Safari 
          // detecten que es una PWA antes de redirigir
          setTimeout(() => {
              window.location.href = "https://redaltea.com";
          }, 3000);
      }
    </script>
</body>
</html>
